<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Avijat Shop BD</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header class="header">

    <div class="container">

        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="Avijat Shop BD">
        </a>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

    </div>

</header>

<section class="page-title">

    <div class="container">

        <h1>Our Shop</h1>

        <p>Premium Fashion Collection</p>

    </div>

</section>
<section class="products">

    <div class="container">

        <div class="section-title">
            <h2>All Products</h2>
            <p>Choose your favorite fashion item</p>
        </div>

        <div class="product-grid">

            <!-- Product 1 -->
            <div class="product-card">

                <span class="badge">20% OFF</span>

                <img src="images/products/product1.jpg" alt="Premium T-Shirt">

                <h3>Premium T-Shirt</h3>

                <p class="price">
                    <del>৳1200</del>
                    <strong>৳960</strong>
                </p>

                <button class="btn">Add To Cart</button>

            </div>

            <!-- Product 2 -->
            <div class="product-card">

                <span class="badge new">NEW</span>

                <img src="images/products/product2.jpg" alt="Stylish Polo Shirt">

                <h3>Stylish Polo Shirt</h3>

                <p class="price">
                    <strong>৳1350</strong>
                </p>

                <button class="btn">Add To Cart</button>

            </div>

            <!-- Product 3 -->
            <div class="product-card">

                <span class="badge hot">HOT</span>

                <img src="images/products/product3.jpg" alt="Casual Shirt">

                <h3>Casual Shirt</h3>

                <p class="price">
                    <strong>৳1450</strong>
                </p>

                <button class="btn">Add To Cart</button>

            </div>

        </div>

    </div>

</section>
